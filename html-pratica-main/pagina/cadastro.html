<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <style>
      body {
        font-family: "Raleway", sans-serif;
      }
    </style>
  </head>

  <body>
    <h1>Cadastro</h1>
    <hr />

    <center>
      <table border="3" cellpadding="20" style="background-color: #9aa6b2">
        <tr>
          <td>
            <form action="produto.html" method="get">
              <center>
                <h3>Cadastro do Usuário</h3>
              </center>

              <hr />

              <label>Nome:</label><br />
              <input type="text" name="nome" size="40" /><br /><br />

              <label>Endereço:</label><br />
              <input type="text" name="endereco" size="40" /><br /><br />

              <label>Cidade:</label><br />
              <input type="text" name="cidade" size="30" /><br /><br />

              <label>CPF:</label><br />
              <input type="text" name="cpf" size="30" /><br /><br />

              <label>RG:</label><br />
              <input type="text" name="rg" size="30" /><br /><br />

              <label>Estado Civil:</label><br />
              <select name="estado_civil">
                <option>Solteiro</option>
                <option>Casado</option>
                <option>Desquitado</option>
              </select>

              <center>
                <h3>Marcas de Preferência</h3>

                <table border="1" cellpadding="25">
                  <tr>
                    <td>
                      <input
                        type="checkbox"
                        name="marca"
                        value="s"
                      />Samsung<br />
                      <input type="checkbox" name="marca" value="t" /> TCA<br />
                      <input type="checkbox" name="marca" value="d" />Dell<br />
                      <input
                        type="checkbox"
                        name="marca"
                        value="m"
                      />Multilaser<br />
                      <input type="checkbox" name="marca" value="a" />Acer<br />
                    </td>

                    <td>
                      <input
                        type="checkbox"
                        name="marca"
                        value="i"
                      />IPhone<br />
                      <input type="checkbox" name="marca" value="p" />
                      Philips<br />
                      <input type="checkbox" name="marca" value="ap" />
                      Apple<br />
                      <input type="checkbox" name="marca" value="h" /> HP<br />
                      <input type="checkbox" name="marca" value="l" /> LG<br />
                    </td>
                  </tr>
                </table>

                <br />

                <input type="submit" value="Salvar" style="color: #0d4715" />
                <input
                  type="reset"
                  value="Apagar Dados"
                  style="color: #980404"
                />
              </center>
            </form>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
